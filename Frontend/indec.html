<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhận diện giọng nói theo người nói</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-b from-zinc-950 via-zinc-900 to-zinc-950 text-zinc-100">
    <main class="max-w-4xl mx-auto p-4 md:p-8">
        <h1 class="text-2xl md:text-3xl font-bold text-cyan-300 mb-2">Upload file âm thanh -> Văn bản theo từng người nói</h1>
        <p class="text-zinc-400 mb-6">Chọn file âm thanh (mp3, wav, m4a...) và hệ thống sẽ trả về từng câu thoại kèm nhãn người nói.</p>

        <section class="rounded-2xl border border-zinc-800 bg-zinc-900/70 p-4 md:p-6 shadow-xl">
            <div class="grid md:grid-cols-3 gap-4 items-end">
                <div class="md:col-span-2">
                    <label for="audioFile" class="block text-sm text-zinc-300 mb-2">File âm thanh</label>
                    <input id="audioFile" type="file" accept="audio/*"
                        class="block w-full text-sm text-zinc-200 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-cyan-700 file:text-white hover:file:bg-cyan-600 bg-zinc-950 border border-zinc-800 rounded-lg" />
                </div>

                <div>
                    <label for="numSpeakers" class="block text-sm text-zinc-300 mb-2">Số người nói (tuỳ chọn)</label>
                    <input id="numSpeakers" type="number" min="0" placeholder="Tự động"
                        class="w-full bg-zinc-950 border border-zinc-800 p-2.5 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500" />
                </div>
            </div>

            <div class="mt-4 flex gap-3">
                <button id="uploadBtn" class="bg-cyan-600 px-6 py-2.5 rounded-lg font-semibold hover:bg-cyan-500 transition">Xử lý file</button>
            </div>

            <p id="status" class="mt-3 text-sm text-zinc-400">Sẵn sàng xử lý.</p>
        </section>

        <section class="mt-6">
            <h2 class="text-xl font-semibold mb-3 text-zinc-200">Kết quả</h2>
            <ul id="resultList" class="space-y-3">
                <li class="p-4 rounded-lg bg-zinc-900 border border-zinc-800 text-zinc-400">Kết quả nhận diện sẽ hiển thị ở đây.</li>
            </ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
