<body class="bg-black text-white font-sans">
    <div class="container mx-auto p-4 max-w-5xl">
        <h1 class="text-2xl font-bold mb-4 text-blue-400">AI Live Subtitles for YouTube/Streaming</h1>
        
        <div class="flex gap-2 mb-6">
            <input id="videoUrl" type="text" placeholder="Dán link YouTube tại đây..." 
                   class="flex-1 bg-zinc-800 border border-zinc-700 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button id="loadVideo" class="bg-blue-600 px-6 py-3 rounded-lg font-bold hover:bg-blue-500">Tải Video</button>
        </div>

        <div class="relative bg-zinc-900 rounded-2xl overflow-hidden shadow-2xl aspect-video border border-zinc-800">
            <div id="player" class="w-full h-full">
                <div class="flex items-center justify-center h-full text-zinc-600">
                    Chưa có video được tải...
                </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 h-1/3 bg-gradient-to-t from-black/90 to-transparent pointer-events-none flex items-end justify-center pb-10 px-10">
                <p id="sub-display" class="text-white text-3xl md:text-4xl font-bold text-center leading-tight drop-shadow-lg opacity-0 transition-opacity duration-300">
                    Phụ đề sẽ hiện ở đây...
                </p>
            </div>
        </div>

        <div class="mt-6 flex justify-center gap-4">
            <button id="startBtn" class="bg-green-600 px-10 py-4 rounded-xl font-bold text-xl hover:scale-105 transition">BẮT ĐẦU PHỤ ĐỀ</button>
            <button id="exportBtn" class="bg-zinc-700 px-6 py-4 rounded-xl font-bold hidden">Xuất file .SRT</button>
        </div>
        <p id="instruction" class="text-center mt-4 text-zinc-500">Lưu ý: Khi nhấn "Bắt đầu", hãy chọn tab trình duyệt đang phát video để lấy âm thanh.</p>
    </div>
    <script src="script.js"></script>
</body>
